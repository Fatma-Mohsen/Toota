<!DOCTYPE html>
<html>
<head>
    <title>Perfumes Section</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #d0b3b3;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dd {
            font-size: 35px;
            font-style: italic;
            color: #8e5f73;
            margin-top: 50px;
            margin-bottom: 10px;
            text-align: center;
        }

        .top {
            font-size: 1rem;
            color: #565050;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .ct {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            width: 90%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .cd {
            width: calc(45% - 20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .cd:hover {
            transform: translateY(-10px);
        }

        .cd img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #8e5f73;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .cd p {
            margin-top: 20px;
            font-weight: bold;
            color: #8e5f73;
            font-size: 20px;
            text-transform: capitalize;
            letter-spacing: 1px;
        }

        hr {
            width: 60%;
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1 class="dd">Exquisite Fragrances</h1>
    <hr>
    <h1 class="top">Choose Your Signature Scent</h1>

            <a href="perfume woman.html">
                <img src="WhatsApp Image 2026-04-17 at 5.17.40 PM (1).jpeg">
            </a>
            <p>For Her</p>
        </div>

        <div class="cd">
            <a href="perfume men.html">
                <img src="WhatsApp Image 2026-04-17 at 4.58.28 PM (6).jpeg">
            </a>
            <p>For Him</p>
        </div>
    </div>

</body>
</html>
