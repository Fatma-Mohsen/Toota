        .category-item {

            align-items: center;
            transition: transform 0.3s ease;
        }

        .category-item:hover {
            transform: translateY(-10px);
        }

        .category-item img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #8e5f73;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .category-item p {
            margin-top: 10px;
            font-weight: bold;
            color: #8e5f73;
            font-size: 18px;
        }
        .ctr {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            width: calc(45% - 10px);
            max-width: 300px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
        }

        .card figcaption {
            margin-top: 15px;
            color: #8f808a;
            font-weight: bold;
            font-size: 14px;
        }

        .card del {
            color: #cc0000;
            margin-right: 5px;
            font-size: 12px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            background-color: #8e5f73;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #6d3263;
            transform: scale(1.05);
        }

        figure { margin: 0; }
        .sc {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background-color: #8c6576;
    color: white;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 25px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 1000;
    transition: 0.3s;
}

.sc:hover {
    transform: scale(1.1);
    background-color: #6d3263;
}


#cc {
    position: absolute;
    top: 0;
    right: 0;
    background: #ffb6c1;
    color: #8c6576;
    font-size: 12px;
    font-weight: bold;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 1px solid white;
}

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('myCart')) || [];
        const countElement = document.getElementById('cc');
        if (countElement) {
            countElement.innerText = cart.length;
        }
    }
    updateCartCount();

    document.querySelectorAll('button').forEach(btn => {
        if (btn.innerText.includes('ADD TO CART') || btn.innerText.includes('ADD TO CARD')) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                
                const card = this.closest('.card') || this.closest('figure');
                if (!card) return;

                const img = card.querySelector('img');
                const info = card.querySelector('figcaption');

                let displayHTML = info ? info.innerHTML : 'Price not found';
                let textContent = info ? info.innerText : '0';
                
                let prices = textContent.match(/\d+/g);
                let mathPrice = prices ? prices[prices.length - 1] : '0';

                const product = {
                    name: "Fashion Item",
                    displayPrice: displayHTML,
                    calculationPrice: mathPrice,
                    image: img ? img.getAttribute('src') : ''
                };

                let cart = JSON.parse(localStorage.getItem('myCart')) || [];
                cart.push(product);
                localStorage.setItem('myCart', JSON.stringify(cart));
                updateCartCount();
                console.log("Item added to cart!");
            });
        }
    });
});
</script>
